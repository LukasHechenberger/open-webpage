name: CI
env:
  DEBUG: napi:*
  APP_NAME: open-webpage
  MACOSX_DEPLOYMENT_TARGET: '10.13'
permissions:
  contents: write
  id-token: write
'on':
  push:
    branches:
      - main
    tags-ignore:
      - '**'
    paths-ignore:
      - '**/*.md'
      - LICENSE
      - '**/*.gitignore'
      - .editorconfig
      - docs/**
  pull_request: null
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        rust: ['stable']
        node: ['22']
        settings:
          - name: JS + Linux (x86_64)
            host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            buildJavascript: true
          - name: 'macOS (x86_64)'
            host: macos-latest
            target: x86_64-apple-darwin
          - name: macOS (aarch64)
            host: macos-latest
            target: aarch64-apple-darwin
          - name: 'Windows (x86_64)'
            host: windows-latest
            target: x86_64-pc-windows-msvc
    name: Build ${{ matrix.settings.name }}
    runs-on: ${{ matrix.settings.host }}
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
      - name: Setup node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - name: Install
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{matrix.rust}}
          targets: ${{ matrix.settings.target }}
      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ matrix.settings.target }}
      - uses: mlugg/setup-zig@v1
        if: ${{ matrix.settings.target == 'armv7-unknown-linux-gnueabihf' || matrix.settings.target == 'armv7-unknown-linux-musleabihf' }}
        with:
          version: 0.13.0
      - name: Install Linux system dependencies
        if: ${{ runner.os == 'Linux' }}
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: build-essential libglib2.0-dev libgtk-3-dev libgtk-4-dev libwebkit2gtk-4.1-dev pkg-config
          version: 1.0
      - name: Setup node x86
        if: matrix.settings.target == 'i686-pc-windows-msvc'
        run: pnpm config set supportedArchitectures.cpu "ia32"
        shell: bash
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline --ignore-scripts
      - name: Setup node x86
        uses: actions/setup-node@v5
        if: matrix.settings.target == 'i686-pc-windows-msvc'
        with:
          node-version: 22
          cache: pnpm
          architecture: x86
      - name: Build
        run: pnpm build:rust --target ${{ matrix.settings.target }}
        shell: bash
      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: bindings-${{ matrix.settings.target }}
          path: ${{ env.APP_NAME }}.*.node
          if-no-files-found: error
      - name: TS Code Checks
        if: matrix.settings.buildJavascript
        run: |
          pnpm prepare
          pnpm build:js
      - name: Ensure git clean
        run: git diff --exit-code || (echo "There are uncommitted changes!" && exit 1)
      - name: Upload JS Artifact
        if: matrix.settings.buildJavascript
        uses: actions/upload-artifact@v5
        with:
          name: js
          path: out
          if-no-files-found: error

  test:
    name: Test ${{ matrix.settings.target }} - node@${{ matrix.node }}
    needs:
      - build
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: macos-latest
            target: x86_64-apple-darwin
          - host: windows-latest
            target: x86_64-pc-windows-msvc
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
        node:
          - '22'
          - '24'
    runs-on: ${{ matrix.settings.host }}
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
      - name: Install Linux system dependencies
        if: ${{ runner.os == 'Linux' }}
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: build-essential libglib2.0-dev libgtk-3-dev libgtk-4-dev libwebkit2gtk-4.1-dev pkg-config
          version: 1.0
      - name: Setup node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
          architecture: x64
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline --ignore-scripts
      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          name: bindings-${{ matrix.settings.target }}
          path: .
      - name: Download JS artifacts
        uses: actions/download-artifact@v5
        with:
          name: js
          path: out
      - name: Test bindings
        run: pnpm test
  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs:
      - build
      - test
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
      - name: Setup node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline
      - name: Download all bindings
        uses: actions/download-artifact@v5
        with:
          path: artifacts
          pattern: bindings-*
      - name: Download JS artifacts
        uses: actions/download-artifact@v5
        with:
          path: out
          name: js
      - name: Move artifacts
        run: pnpm artifacts
      - name: Check published files exist
        run: bash ./scripts/pkg-ok.sh
      - id: changesets
        if: ${{ github.event_name == 'push' }}
        name: Changesets
        uses: changesets/action@v1
        with:
          commit: 'chore: Update versions'
          title: 'chore: Update versions'
          publish: pnpm changeset publish
          version: pnpm changeset version
          commitMode: github-api
        env:
          GITHUB_TOKEN: ${{ secrets.CHANGESETS_GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
